<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Select & Paste</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 520px; }
  body {
    width: 320px;
    background: #0d0d0d;
    color: #d4d4d4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #ffaa1e, #e66e00);
    flex-shrink: 0;
  }
  h1 { font-size: 14px; color: #fff; }
  .sub { font-size: 10.5px; color: #666; margin-top: 1px; }
  .row {
    display: flex; align-items: center; justify-content: space-between;
    background: #111; border: 1px solid #1e1e1e; border-radius: 10px;
    padding: 11px 13px; margin-bottom: 14px;
  }
  .row-label { font-size: 12.5px; color: #ccc; font-weight: 500; }
  .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #252525; border-radius: 20px;
    cursor: pointer; transition: 0.2s; border: 1px solid #333;
  }
  .slider:before {
    content: ''; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px;
    background: #555; border-radius: 50%; transition: 0.2s;
  }
  input:checked + .slider { background: #4a1f00; border-color: #e66e00; }
  input:checked + .slider:before { background: #ffaa1e; transform: translateX(16px); }

  .section-title {
    font-size: 10px; font-weight: 700; color: #e66e00;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .clear-btn {
    font-size: 10px; color: #555; cursor: pointer; text-transform: none;
    letter-spacing: 0; font-weight: 500;
  }
  .clear-btn:hover { color: #999; }

  .scroll-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-bottom: 10px;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: #e66e00 transparent;
  }
  .scroll-area::-webkit-scrollbar { width: 5px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }
  .scroll-area::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #ffaa1e, #e66e00);
    border-radius: 10px;
  }
  .scroll-area::-webkit-scrollbar-thumb:hover { background: #ffaa1e; }
  .list { margin-bottom: 16px; }
  .empty { font-size: 11px; color: #444; padding: 10px 2px; font-style: italic; }

  .item {
    display: flex; align-items: center; gap: 8px;
    background: #111; border: 1px solid #1e1e1e; border-radius: 8px;
    padding: 8px 10px; margin-bottom: 6px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .item:hover { border-color: #e66e00; }
  .item-text {
    flex: 1; font-size: 12px; color: #ccc;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-btn {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    color: #555; font-size: 13px; padding: 2px 4px; line-height: 1;
  }
  .item-btn:hover { color: #ffaa1e; }
  .item-btn.remove:hover { color: #e05252; }

  .hint { font-size: 10.5px; color: #555; line-height: 1.5; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"></div>
  <div>
    <h1>Select & Paste</h1>
    <div class="sub">Select to copy, double-click to paste</div>
  </div>
</div>

<div class="row">
  <span class="row-label">Enabled</span>
  <label class="switch">
    <input type="checkbox" id="enabled" checked>
    <span class="slider"></span>
  </label>
</div>

<div class="scroll-area">
  <div class="section-title">
    <span>📌 Pinned</span>
  </div>
  <div class="list" id="pinnedList"></div>

  <div class="section-title">
    <span>Recent History</span>
    <span class="clear-btn" id="clearHistory">Clear</span>
  </div>
  <div class="list" id="historyList"></div>
</div>

<div class="hint">
  Click any item to paste it into the last field you were typing in. Use the pin icon to keep something around permanently.
</div>

<script src="popup.js"></script>
</body>
</html>
